version: 2
updates:
  - package-ecosystem: pip
    directory: "/server"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Berlin
    groups:
      python-runtime:
        patterns: ["*"]
    open-pull-requests-limit: 5
    labels: ["dependencies", "area: backend"]
    commit-message:
      prefix: "deps"
  - package-ecosystem: pip
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:15"
      timezone: Europe/Berlin
    groups:
      python-development:
        patterns: ["*"]
    open-pull-requests-limit: 5
    labels: ["dependencies", "area: tests"]
    commit-message:
      prefix: "deps-dev"
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:30"
      timezone: Europe/Berlin
    groups:
      github-actions:
        patterns: ["*"]
    labels: ["dependencies", "area: ci"]
    commit-message:
      prefix: "ci"
