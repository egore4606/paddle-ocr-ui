changelog:
  exclude:
    labels: ["skip-changelog"]
  categories:
    - title: Breaking changes
      labels: ["breaking-change"]
    - title: Features
      labels: ["type: feature"]
    - title: Fixes
      labels: ["type: bug"]
    - title: Documentation
      labels: ["type: documentation"]
    - title: Dependencies
      labels: ["dependencies"]
    - title: Other changes
      labels: ["*"]
