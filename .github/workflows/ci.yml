name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality checks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            server/requirements.txt
            requirements-dev.txt
      - name: Install development tools
        run: python -m pip install --disable-pip-version-check -r requirements-dev.txt
      - name: Lint Python
        run: ruff check .
      - name: Audit runtime dependencies
        run: pip-audit -r server/requirements.txt
      - name: Compile Python
        run: python -m compileall -q server tests
      - name: Validate browser JavaScript
        run: node --check web/app.js

  tests:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            server/requirements.txt
            requirements-dev.txt
      - name: Install dependencies
        run: python -m pip install --disable-pip-version-check -r requirements-dev.txt
      - name: Run tests
        run: pytest --cov=server --cov-report=term-missing
